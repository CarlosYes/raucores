<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <title>Radio Amigos Unidos</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        /* Reset para evitar interferências do xat */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 60px; 
            background: #000 url('https://img.freepik.com/fotos-premium/fundo-de-rosas-pretas-estilo-gotico-luxuoso_863013-43305.jpg') center/cover no-repeat;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0.3) 0%, rgba(255, 255, 0, 0.2) 100%);
            z-index: 1;
            pointer-events: none;
            transition: 1.5s ease-in-out;
        }

        /* ESTE É O SEGREDO: Mantém a precisão milimétrica em qualquer ecrã */
        .main-scaler {
            transform: scale(min(1, calc(100vw / 1580), calc(100vh / 950)));
            transform-origin: top center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            width: 1580px; /* Largura virtual para manter as distâncias fixas */
        }

        .stage-area {
            position: relative;
            width: 728px;
            height: 486px;
            margin-top: 39px;
        }

        .theme-nav {
            position: absolute;
            top: -35px; 
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            z-index: 9999;
            padding: 0 5px;
        }

        .theme-nav span {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 -2px 5px rgba(0,0,0,0.5);
            transition: 0.3s;
            flex-shrink: 0;
        }

        .xat-area-frame {
            width: 728px;
            height: 486px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.8);
            position: relative;
            z-index: 50;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
            overflow: hidden;
            transform: translate(4px, -5px);
        }

        .xat-area-frame::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shineFrame 6s infinite;
        }

        @keyframes shineFrame {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .dj-wrap {
            position: absolute;
            top: 25px; 
            width: 400px;
            height: 486px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding-top: 110px; 
        }

        .left-dj { left: -380px; }
        .right-dj { right: -380px; }
        
        .dj-wrap img { 
            width: 350px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
            transform: scaleY(1.15); 
            animation: floatAnim 4s ease-in-out infinite;
        }

        .left-dj img {
            width: 380px; 
            margin-left: -20px;
        }

        @keyframes floatAnim { 
            0%, 100% { transform: scaleY(1.15) translateY(0); } 
            50% { transform: scaleY(1.15) translateY(-10px); } 
        }

        .v-label {
            position: absolute;
            font-size: 3.8rem;
            white-space: nowrap;
            z-index: 30;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -2px;
            margin-top: -110px; 
        }

        .left-dj .v-label { transform: rotate(-90deg); left: -125px; }
        .right-dj .v-label { transform: rotate(90deg); right: -215px; }

        .rainbow {
            background: linear-gradient(to right, #FF0000, #FF00FF, #0000FF, #00FFFF, #00FF00, #FFFF00, #FF0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-anim 4s linear infinite;
        }
        @keyframes rainbow-anim { to { background-position: 200% center; } }

        .footer-text {
            position: absolute;
            bottom: -90px;
            width: 1200px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 2.3rem;
            font-weight: 900;
            text-shadow: 0 8px 30px rgba(0,0,0,1);
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;">

    <div class="bg-overlay" id="overlay"></div>

    <div class="main-scaler">
        <div class="stage-area">
            
            <div class="theme-nav">
                <span style="--c1:#00ff00; --c2:#004400;" onclick="applyTheme('#00ff00','rgba(0,255,0,0.3)','rgba(0,50,0,0.7)')"></span> 
                <span style="--c1:#0000ff; --c2:#000033;" onclick="applyTheme('#0000ff','rgba(0,0,255,0.3)','rgba(0,0,50,0.7)')"></span> 
                <span style="--c1:#ff0000; --c2:#440000;" onclick="applyTheme('#ff0000','rgba(255,0,0,0.3)','rgba(50,0,0,0.7)')"></span> 
                <span style="--c1:#00ffff; --c2:#004444;" onclick="applyTheme('#00ffff','rgba(0,255,255,0.3)','rgba(0,50,50,0.7)')"></span> 
                <span style="--c1:#ff00ff; --c2:#440044;" onclick="applyTheme('#ff00ff','rgba(255,0,255,0.3)','rgba(50,0,50,0.7)')"></span> 
                <span style="--c1:#ffff00; --c2:#444400;" onclick="applyTheme('#ffff00','rgba(255,255,0,0.3)','rgba(50,50,0,0.7)')"></span>
                <span style="--c1:#ffffff; --c2:#333333;" onclick="applyTheme('#ffffff','rgba(255,255,255,0.3)','rgba(50,50,50,0.4)')"></span>
                <span style="--c1:#ff8800; --c2:#442200;" onclick="applyTheme('#ff8800','rgba(255,136,0,0.3)','rgba(100,50,0,0.7)')"></span>
                <span style="--c1:#8800ff; --c2:#220044;" onclick="applyTheme('#8800ff','rgba(136,0,255,0.3)','rgba(50,0,100,0.7)')"></span>
                <span style="--c1:#00ff88; --c2:#004422;" onclick="applyTheme('#00ff88','rgba(0,255,136,0.3)','rgba(0,100,50,0.7)')"></span>
                <span style="--c1:#4b0082; --c2:#1a0033;" onclick="applyTheme('#4b0082','rgba(75,0,130,0.3)','rgba(0,0,0,0.8)')"></span>
                <span style="--c1:#adff2f; --c2:#223300;" onclick="applyTheme('#adff2f','rgba(173,255,47,0.3)','rgba(50,70,0,0.7)')"></span>
                <span style="--c1:#ffa07a; --c2:#441111;" onclick="applyTheme('#ffa07a','rgba(255,160,122,0.3)','rgba(80,30,30,0.7)')"></span>
                <span style="--c1:#7fffd4; --c2:#003322;" onclick="applyTheme('#7fffd4','rgba(127,255,212,0.3)','rgba(30,80,60,0.7)')"></span>
                <span style="--c1:#ffd700; --c2:#332200;" onclick="applyTheme('#ffd700','rgba(255,215,0,0.3)','rgba(0,0,0,0.8)')"></span>
            </div>

            <div class="dj-wrap left-dj">
                <div class="v-label rainbow">Rádio Dos</div>
                <img src="https://i.imgur.com/ElDKf77.png" alt="DJ 1">
            </div>

            <div class="xat-area-frame" id="luxury-border"></div>

            <div class="dj-wrap right-dj">
                <div class="v-label rainbow">Amigos Unidos</div>
                <img src="https://i.imgur.com/eiDVyon.png" alt="DJ 2">
            </div>

            <div class="footer-text rainbow">Amigos De Verdade É Aqui...</div>
        </div>
    </div>

    <script>
        function applyTheme(borderColor, topColor, bottomColor) {
            const border = document.getElementById('luxury-border');
            const bg = document.getElementById('overlay');
            border.style.borderColor = borderColor;
            border.style.boxShadow = `0 0 70px ${borderColor}, inset 0 0 35px ${borderColor}`;
            bg.style.background = `linear-gradient(to bottom, ${topColor} 0%, ${bottomColor} 100%)`;
        }
        document.oncontextmenu = function(){ alert("©arlos Copyright"); return false; };
    </script>
</body>
</html>
