<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <title>Radio Amigos Unidos</title>
    <meta name="description" content="RAU" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta property="og:title" content="RAU Player" />
    <meta property="og:description" content="RAU" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="48x48" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="144x144" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/nNh98kV.png" sizes="180x180"/>
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            background-image: url('https://img.freepik.com/fotos-premium/fundo-de-rosas-pretas-estilo-gotico-luxuoso_863013-43305.jpg');
            background-size: cover;
            background-position: center;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0.4) 0%, rgba(255, 255, 0, 0.4) 100%);
            z-index: 1;
            transition: all 1s ease-in-out;
            pointer-events: none;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            animation: lightPulse 6s infinite alternate;
        }

        @keyframes lightPulse {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }

        .main-scaler {
            /* Escala inteligente para caber em qualquer PC sem cortar o topo */
            transform: scale(min(0.88, calc(100vw / 1550), calc(100vh / 900)));
            transform-origin: center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .stage-area {
            position: relative;
            width: 728px;
            height: 486px;
        }

        /* BOLAS DE CORES: Posicionamento Absoluto e Elevado */
        .theme-nav {
            position: absolute;
            top: -43px; /* Subidas para a posição que gostas no teu PC */
            left: 0;
            width: 728px;
            display: flex;
            justify-content: space-between;
            z-index: 9999; /* Força ficar à frente de qualquer barra do xat */
            padding: 0 2px;
        }

        .theme-nav span {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.8), inset -2px -2px 4px rgba(0,0,0,0.4);
            transition: 0.3s ease;
            position: relative;
        }

        .theme-nav span:hover { 
            filter: brightness(1.3);
            box-shadow: 0 0 15px var(--c1);
            transform: translateY(-3px);
        }

        .xat-area-frame {
            width: 728px;
            height: 486px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 2px solid #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 50;
            animation: borderPulse 4s infinite alternate;
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.2); }
            100% { box-shadow: 0 0 70px rgba(255, 255, 255, 0.5); }
        }

        .dj-wrap {
            position: absolute;
            top: 60px;
            height: 486px;
            width: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .left-dj { left: -410px; }
        .right-dj { right: -410px; }
        
        .dj-wrap img { 
            width: 275px; 
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.9));
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .v-label {
            position: absolute;
            font-size: 3.8rem;
            white-space: nowrap;
            z-index: 30;
            text-transform: uppercase;
            font-weight: 900;
            font-family: 'Segoe UI', Arial, sans-serif;
            letter-spacing: -2px;
        }

        .left-dj .v-label { transform: rotate(-90deg); left: -85px; }
        .right-dj .v-label { transform: rotate(90deg); right: -165px; }

        .rainbow-v {
            background: linear-gradient(to bottom, #FF0000, #FF00FF, #0000FF, #00FFFF, #00FF00, #FFFF00, #FF0000);
            background-size: auto 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-v-anim 3s linear infinite;
        }
        @keyframes rainbow-v-anim { to { background-position: center 200%; } }

        .rainbow-h {
            background: linear-gradient(to right, #FF0000, #FF00FF, #0000FF, #00FFFF, #00FF00, #FFFF00, #FF0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-h-anim 3s linear infinite;
        }
        @keyframes rainbow-h-anim { to { background-position: 200% center; } }

        .footer-text {
            position: absolute;
            bottom: -80px;
            width: 1200px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 2.3rem;
            font-weight: 900;
            text-shadow: 0 5px 25px #000;
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;">

    <div class="bg-overlay" id="overlay"></div>

    <div class="main-scaler">
        <div class="stage-area">
            
            <div class="theme-nav">
                <span style="--c1:#00ff00; --c2:#004400;" onclick="applyLuxury('#00ff00','rgba(0,255,0,0.5)','rgba(0,50,0,0.7)')"></span> 
                <span style="--c1:#0000ff; --c2:#000033;" onclick="applyLuxury('#0000ff','rgba(0,0,255,0.5)','rgba(0,0,50,0.7)')"></span> 
                <span style="--c1:#ff0000; --c2:#440000;" onclick="applyLuxury('#ff0000','rgba(255,0,0,0.5)','rgba(50,0,0,0.7)')"></span> 
                <span style="--c1:#00ffff; --c2:#004444;" onclick="applyLuxury('#00ffff','rgba(0,255,255,0.5)','rgba(0,50,50,0.7)')"></span> 
                <span style="--c1:#ff00ff; --c2:#440044;" onclick="applyLuxury('#ff00ff','rgba(255,0,255,0.5)','rgba(50,0,50,0.7)')"></span> 
                <span style="--c1:#ffff00; --c2:#444400;" onclick="applyLuxury('#ffff00','rgba(255,255,0,0.5)','rgba(50,50,0,0.7)')"></span>
                <span style="--c1:#ffffff; --c2:#333333;" onclick="applyLuxury('#ffffff','rgba(255,255,255,0.4)','rgba(50,50,50,0.4)')"></span>
                <span style="--c1:#ff8800; --c2:#442200;" onclick="applyLuxury('#ff8800','rgba(255,136,0,0.5)','rgba(100,50,0,0.7)')"></span>
                <span style="--c1:#8800ff; --c2:#220044;" onclick="applyLuxury('#8800ff','rgba(136,0,255,0.5)','rgba(50,0,100,0.7)')"></span>
                <span style="--c1:#00ff88; --c2:#004422;" onclick="applyLuxury('#00ff88','rgba(0,255,136,0.5)','rgba(0,100,50,0.7)')"></span>
                <span style="--c1:#4b0082; --c2:#1a0033;" onclick="applyLuxury('#4b0082','rgba(75,0,130,0.5)','rgba(0,0,0,0.8)')"></span>
                <span style="--c1:#adff2f; --c2:#223300;" onclick="applyLuxury('#adff2f','rgba(173,255,47,0.5)','rgba(50,70,0,0.7)')"></span>
                <span style="--c1:#ffa07a; --c2:#441111;" onclick="applyLuxury('#ffa07a','rgba(255,160,122,0.5)','rgba(80,30,30,0.7)')"></span>
                <span style="--c1:#7fffd4; --c2:#003322;" onclick="applyLuxury('#7fffd4','rgba(127,255,212,0.5)','rgba(30,80,60,0.7)')"></span>
                <span style="--c1:#ffd700; --c2:#332200;" onclick="applyLuxury('#ffd700','rgba(255,215,0,0.5)','rgba(0,0,0,0.8)')"></span>
            </div>

            <div class="dj-wrap left-dj">
                <div class="v-label rainbow-v">Rádio Dos</div>
                <img src="https://xatimg.com/image/acdE3rgJISfK.gif">
            </div>

            <div class="xat-area-frame" id="luxury-border">
                </div>

            <div class="dj-wrap right-dj">
                <div class="v-label rainbow-v">Amigos Unidos</div>
                <img src="https://xatimg.com/image/uC0o5wdU6vzD.gif">
            </div>

            <div class="footer-text rainbow-h">Amigos De Verdade É Aqui...</div>
        </div>
    </div>

    <script>
        function applyLuxury(borderColor, topColor, bottomColor) {
            const border = document.getElementById('luxury-border');
            const bg = document.getElementById('overlay');
            border.style.borderColor = borderColor;
            border.style.boxShadow = `0 0 70px ${borderColor}, inset 0 0 35px ${borderColor}`;
            bg.style.background = `linear-gradient(to bottom, ${topColor} 0%, ${bottomColor} 100%)`;
            bg.style.boxShadow = `inset 0 0 250px ${borderColor}`;
        }

        // Proteção
        var message = "©arlos Copyright";
        document.oncontextmenu = function(){ alert(message); return false; };
        document.onselectstart = function(){ return false; };
    </script>
</body>
</html>
